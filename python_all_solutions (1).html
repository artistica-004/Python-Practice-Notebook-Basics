<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Solutions — All Topics</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --card: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #7d8590;
  --dim: #b1bac4;
  --beginner: #3fb950;
  --easy: #58a6ff;
  --medium: #d29922;
  --hard: #f85149;
  --expert: #bc8cff;
  --code-bg: #0d1117;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; }

/* Sidebar */
#sidebar {
  position:fixed; left:0; top:0; bottom:0; width:240px;
  background:var(--surface); border-right:1px solid var(--border);
  z-index:100; overflow-y:auto; display:flex; flex-direction:column;
}
.sb-logo {
  padding:20px 18px 14px;
  border-bottom:1px solid var(--border);
}
.sb-logo-top { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--beginner); letter-spacing:1px; margin-bottom:4px; }
.sb-logo-title { font-size:1rem; font-weight:800; color:var(--text); }
.sb-logo-sub { font-size:11px; color:var(--muted); margin-top:2px; }

.sb-nav { flex:1; padding:8px; }
.sb-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 10px; border-radius:6px; cursor:pointer;
  transition:all 0.15s; margin-bottom:2px;
}
.sb-item:hover { background:rgba(255,255,255,0.05); }
.sb-item.active { background:rgba(63,185,80,0.1); }
.sb-item.active .sb-name { color:var(--beginner); }
.sb-icon { font-size:16px; min-width:20px; }
.sb-name { font-size:12px; font-weight:600; color:var(--muted); }
.sb-count { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); margin-top:1px; }

/* Main */
#main { margin-left:240px; min-height:100vh; }

.top-bar {
  position:sticky; top:0;
  background:rgba(13,17,23,0.92); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:14px 32px; display:flex; align-items:center; justify-content:space-between;
  z-index:50;
}
.top-bar-title { font-size:1.1rem; font-weight:700; }
.top-bar-sub { font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-top:2px; }

.filter-row { display:flex; gap:6px; flex-wrap:wrap; }
.fbtn {
  font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
  padding:4px 11px; border-radius:5px; border:1px solid var(--border);
  background:transparent; cursor:pointer; transition:all 0.15s; letter-spacing:0.5px;
}
.fbtn.all { color:var(--dim); }
.fbtn.all.on, .fbtn.all:hover { border-color:var(--dim); color:var(--text); background:rgba(177,186,196,0.1); }
.fbtn.fb { color:var(--beginner); }
.fbtn.fb.on { border-color:var(--beginner); background:rgba(63,185,80,0.1); }
.fbtn.fe { color:var(--easy); }
.fbtn.fe.on { border-color:var(--easy); background:rgba(88,166,255,0.1); }
.fbtn.fm { color:var(--medium); }
.fbtn.fm.on { border-color:var(--medium); background:rgba(210,153,34,0.1); }
.fbtn.fh { color:var(--hard); }
.fbtn.fh.on { border-color:var(--hard); background:rgba(248,81,73,0.1); }
.fbtn.fx { color:var(--expert); }
.fbtn.fx.on { border-color:var(--expert); background:rgba(188,140,255,0.1); }

.content { padding:28px 32px; max-width:920px; }

/* Solution Card */
.sol-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; margin-bottom:14px; overflow:hidden;
  transition:border-color 0.2s;
}
.sol-card:hover { border-color:#444d56; }
.sol-card[data-diff="beginner"] { border-left:3px solid var(--beginner); }
.sol-card[data-diff="easy"] { border-left:3px solid var(--easy); }
.sol-card[data-diff="medium"] { border-left:3px solid var(--medium); }
.sol-card[data-diff="hard"] { border-left:3px solid var(--hard); }
.sol-card[data-diff="expert"] { border-left:3px solid var(--expert); }

.sol-header {
  display:flex; align-items:flex-start; gap:14px;
  padding:16px 20px; cursor:pointer; user-select:none;
}
.sol-num {
  font-family:'JetBrains Mono',monospace; font-size:11px;
  color:var(--muted); min-width:32px; padding-top:2px;
}
.sol-info { flex:1; }
.sol-title { font-size:0.95rem; font-weight:700; color:var(--text); margin-bottom:4px; }
.sol-desc { font-size:0.83rem; color:var(--muted); line-height:1.5; }
.sol-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.diff-pill {
  font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
  padding:3px 9px; border-radius:4px; letter-spacing:0.5px;
}
.dp-beginner { color:var(--beginner); background:rgba(63,185,80,0.12); border:1px solid rgba(63,185,80,0.3); }
.dp-easy { color:var(--easy); background:rgba(88,166,255,0.12); border:1px solid rgba(88,166,255,0.3); }
.dp-medium { color:var(--medium); background:rgba(210,153,34,0.12); border:1px solid rgba(210,153,34,0.3); }
.dp-hard { color:var(--hard); background:rgba(248,81,73,0.12); border:1px solid rgba(248,81,73,0.3); }
.dp-expert { color:var(--expert); background:rgba(188,140,255,0.12); border:1px solid rgba(188,140,255,0.3); }

.chevron { color:var(--muted); font-size:14px; transition:transform 0.2s; padding-top:2px; }
.sol-card.open .chevron { transform:rotate(180deg); }

/* Body */
.sol-body { display:none; border-top:1px solid var(--border); }
.sol-card.open .sol-body { display:block; }

.sol-inner { padding:20px 20px 20px 66px; display:grid; gap:14px; }

.sec-label {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  color:var(--muted); letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom:8px;
}

/* Code block */
.code-wrap { position:relative; }
.code-block {
  background:var(--code-bg); border:1px solid var(--border);
  border-radius:8px; padding:16px 18px;
  font-family:'JetBrains Mono',monospace; font-size:0.82rem;
  line-height:1.9; overflow-x:auto; white-space:pre;
  color:#e6edf3;
}
.copy-btn {
  position:absolute; top:8px; right:10px;
  font-family:'JetBrains Mono',monospace; font-size:10px;
  padding:4px 10px; border-radius:5px;
  background:var(--surface); border:1px solid var(--border);
  color:var(--muted); cursor:pointer; transition:all 0.15s;
}
.copy-btn:hover { color:var(--text); border-color:#555; }
.copy-btn.copied { color:var(--beginner); border-color:var(--beginner); }

.output-box {
  background:rgba(63,185,80,0.05); border:1px solid rgba(63,185,80,0.2);
  border-radius:8px; padding:12px 16px;
  font-family:'JetBrains Mono',monospace; font-size:0.8rem;
  line-height:1.8; color:#7ee787; white-space:pre-wrap;
}

.explain-box {
  background:rgba(88,166,255,0.05); border:1px solid rgba(88,166,255,0.15);
  border-radius:8px; padding:14px 16px;
  font-size:0.87rem; color:#93c5fd; line-height:1.8;
}

/* Syntax highlighting */
.kw { color:#ff7b72; }
.fn { color:#d2a8ff; }
.st { color:#a5d6ff; }
.cm { color:#8b949e; font-style:italic; }
.nm { color:#79c0ff; }
.op { color:#ff7b72; }
.bi { color:#ffa657; }

/* Section header */
.diff-section-hdr {
  display:flex; align-items:center; gap:12px;
  padding:10px 0 12px; margin-bottom:12px;
  border-bottom:1px solid var(--border);
}
.diff-section-hdr-label {
  font-size:13px; font-weight:700;
  font-family:'JetBrains Mono',monospace; letter-spacing:0.5px;
}
.diff-section-hdr-line { flex:1; height:1px; background:var(--border); }

/* Scrollbar */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

@media(max-width:768px) {
  #sidebar { display:none; }
  #main { margin-left:0; }
  .content { padding:16px; }
  .top-bar { padding:12px 16px; flex-direction:column; align-items:flex-start; gap:10px; }
  .sol-inner { padding:14px; }
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-top">🐍 SOLUTIONS</div>
    <div class="sb-logo-title">Python 0→Hero</div>
    <div class="sb-logo-sub">All solutions with explanation</div>
  </div>
  <div class="sb-nav" id="sbNav"></div>
</div>

<div id="main">
  <div class="top-bar">
    <div>
      <div class="top-bar-title" id="topTitle">Variables & Input/Output</div>
      <div class="top-bar-sub" id="topSub">Click a question to see the solution</div>
    </div>
    <div class="filter-row">
      <button class="fbtn all on" onclick="setFilter('all')">ALL</button>
      <button class="fbtn fb" onclick="setFilter('beginner')">🟢</button>
      <button class="fbtn fe" onclick="setFilter('easy')">🔵</button>
      <button class="fbtn fm" onclick="setFilter('medium')">🟡</button>
      <button class="fbtn fh" onclick="setFilter('hard')">🔴</button>
      <button class="fbtn fx" onclick="setFilter('expert')">⚫</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
const hl = s => s
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const TOPICS = [
{
  icon:"🖨️", name:"Variables & I/O",
  solutions:[
    { diff:"beginner", title:"Say Hello",
      code:`print("Hello, World!")`,
      output:`Hello, World!`,
      explain:`print() is the most basic Python function. It prints whatever is inside the quotes to the screen.` },
    { diff:"beginner", title:"Print Your Name",
      code:`name = "Rahul"\nprint(f"My name is {name}")`,
      output:`My name is Rahul`,
      explain:`We store text in a variable using = sign. f-string (f"...") lets us put variables directly inside the string using {}.` },
    { diff:"beginner", title:"Integer Variables",
      code:`a = 10\nb = 3\nprint("Sum:", a + b)       # 13\nprint("Difference:", a - b)  # 7\nprint("Product:", a * b)     # 30\nprint("Quotient:", a / b)    # 3.333...`,
      output:`Sum: 13\nDifference: 7\nProduct: 30\nQuotient: 3.3333333333333335`,
      explain:`Basic arithmetic operators: + add, - subtract, * multiply, / divide. Division always gives float.` },
    { diff:"beginner", title:"Type Detective",
      code:`a = 10\nb = 3.14\nc = "Hello"\nd = True\nprint(type(a))  # int\nprint(type(b))  # float\nprint(type(c))  # str\nprint(type(d))  # bool`,
      output:`<class 'int'>\n<class 'float'>\n<class 'str'>\n<class 'bool'>`,
      explain:`type() tells you what kind of data is stored in a variable. 4 basic types: int (whole numbers), float (decimals), str (text), bool (True/False).` },
    { diff:"beginner", title:"User Input",
      code:`name = input("Enter your name: ")\nage = input("Enter your age: ")\nprint(f"Hello {name}, you are {age} years old!")`,
      output:`Enter your name: Priya\nEnter your age: 21\nHello Priya, you are 21 years old!`,
      explain:`input() waits for user to type something. It ALWAYS returns a string. We use f-string to combine variables in the output.` },
    { diff:"easy", title:"Simple Calculator",
      code:`a = int(input("Enter first number: "))\nb = int(input("Enter second number: "))\nprint(f"Sum: {a + b}")\nprint(f"Difference: {a - b}")\nprint(f"Product: {a * b}")\nprint(f"Floor Division: {a // b}")`,
      output:`Enter first number: 15\nEnter second number: 4\nSum: 19\nDifference: 11\nProduct: 60\nFloor Division: 3`,
      explain:`int() converts the string from input() to an integer. Without int(), you can't do math. // is floor division — gives integer result without decimal.` },
    { diff:"easy", title:"Area of Rectangle",
      code:`length = float(input("Enter length: "))\nwidth = float(input("Enter width: "))\narea = length * width\nperimeter = 2 * (length + width)\nprint(f"Area: {area}")\nprint(f"Perimeter: {perimeter}")`,
      output:`Enter length: 5\nEnter width: 3\nArea: 15.0\nPerimeter: 16.0`,
      explain:`Area = l × w. Perimeter = 2 × (l + w). We use float() to allow decimal inputs.` },
    { diff:"easy", title:"Temperature Converter",
      code:`c = float(input("Enter temperature in Celsius: "))\nf = (c * 9/5) + 32\nprint(f"{c}°C = {f}°F")`,
      output:`Enter temperature in Celsius: 100\n100.0°C = 212.0°F`,
      explain:`Formula: F = (C × 9/5) + 32. Multiply by 9/5 first, then add 32. 100°C = 212°F is boiling point — good check!` },
    { diff:"easy", title:"Swap Variables",
      code:`a = 5\nb = 10\nprint(f"Before: a={a}, b={b}")\na, b = b, a  # Python magic — tuple swap!\nprint(f"After:  a={a}, b={b}")`,
      output:`Before: a=5, b=10\nAfter:  a=10, b=5`,
      explain:`Python's tuple unpacking: a, b = b, a evaluates the right side first (b=10, a=5), then assigns both at once. No temporary variable needed!` },
    { diff:"medium", title:"Distance & Speed",
      code:`d = float(input("Enter distance (km): "))\nt = float(input("Enter time (hours): "))\nspeed = d / t\ntime_for_500 = 500 / speed\nprint(f"Speed: {speed} km/h")\nprint(f"Time to cover 500km: {time_for_500} hours")`,
      output:`Enter distance (km): 300\nEnter time (hours): 3\nSpeed: 100.0 km/h\nTime to cover 500km: 5.0 hours`,
      explain:`Speed = Distance ÷ Time. Then to find time for 500km: Time = Distance ÷ Speed = 500 ÷ speed.` },
    { diff:"medium", title:"Circle Stats",
      code:`import math\nr = float(input("Enter radius: "))\narea = math.pi * r * r\ncircumference = 2 * math.pi * r\ndiameter = 2 * r\nprint(f"Area: {round(area, 2)}")\nprint(f"Circumference: {round(circumference, 2)}")\nprint(f"Diameter: {diameter}")`,
      output:`Enter radius: 7\nArea: 153.94\nCircumference: 43.98\nDiameter: 14.0`,
      explain:`import math gives us math.pi (= 3.14159...). round(x, 2) rounds to 2 decimal places.` },
    { diff:"medium", title:"Bill Splitter",
      code:`bill = float(input("Enter bill amount: "))\ntax = float(input("Enter tax percentage: "))\npeople = int(input("Enter number of people: "))\ntax_amount = bill * tax / 100\ntotal = bill + tax_amount\neach_person = total / people\nprint(f"Tax Amount: {tax_amount}")\nprint(f"Total with Tax: {total}")\nprint(f"Each person pays: {each_person}")`,
      output:`Enter bill amount: 1000\nEnter tax percentage: 18\nEnter number of people: 4\nTax Amount: 180.0\nTotal with Tax: 1180.0\nEach person pays: 295.0`,
      explain:`3 steps: 1) Calculate tax = bill × tax% ÷ 100. 2) Add tax to bill. 3) Divide by number of people.` },
  ]
},
{
  icon:"⚖️", name:"Operators & Math",
  solutions:[
    { diff:"beginner", title:"Even or Odd",
      code:`n = int(input("Enter a number: "))\nif n % 2 == 0:\n    print("Even")\nelse:\n    print("Odd")`,
      output:`Input: 7 → Odd\nInput: 4 → Even`,
      explain:`% (modulo) gives remainder. Any even number divided by 2 has remainder 0. If n%2==0 → Even, else → Odd.` },
    { diff:"beginner", title:"Last Digit",
      code:`n = int(input("Enter a number: "))\nlast_digit = n % 10\nprint(f"Last digit of {n} is: {last_digit}")`,
      output:`Input: 1234 → Last digit: 4\nInput: 9870 → Last digit: 0`,
      explain:`n % 10 always gives the last digit. Why? Because when you divide by 10, the remainder is exactly the last digit. 1234 ÷ 10 = 123 remainder 4.` },
    { diff:"beginner", title:"Integer Division",
      code:`chocolates = 17\nchildren = 5\neach_gets = chocolates // children   # 3\nleft_over = chocolates % children    # 2\nprint(f"Each child gets: {each_gets}")\nprint(f"Chocolates left: {left_over}")`,
      output:`Each child gets: 3\nChocolates left: 2`,
      explain:`// is floor division (drops decimal). % gives remainder. 17 ÷ 5 = 3 remainder 2.` },
    { diff:"easy", title:"Digit Sum",
      code:`n = int(input("Enter a 3-digit number: "))\nhundreds = n // 100\ntens = (n // 10) % 10\nones = n % 10\ntotal = hundreds + tens + ones\nprint(f"Digits: {hundreds} + {tens} + {ones} = {total}")`,
      output:`Input: 357 → Digits: 3 + 5 + 7 = 15`,
      explain:`Extract hundreds with n//100. Extract tens with (n//10)%10. Extract ones with n%10. Then add all three.` },
    { diff:"easy", title:"Power Without pow()",
      code:`a = int(input("Enter base: "))\nb = int(input("Enter exponent: "))\nresult = 1\nfor i in range(b):\n    result = result * a\nprint(f"{a}^{b} = {result}")`,
      output:`Enter base: 2\nEnter exponent: 8\n2^8 = 256`,
      explain:`Start with result=1. Multiply by 'a' exactly 'b' times in a loop. Like doing 2×2×2×2×2×2×2×2 (8 times) = 256.` },
    { diff:"easy", title:"Absolute Value",
      code:`n = int(input("Enter a number: "))\nif n < 0:\n    n = -n\nprint(f"Absolute value: {n}")`,
      output:`Input: -7 → 7\nInput: 5 → 5`,
      explain:`If number is negative, multiply by -1 to make it positive. Positive numbers stay as they are.` },
    { diff:"easy", title:"Max of Three",
      code:`a = int(input("Enter first: "))\nb = int(input("Enter second: "))\nc = int(input("Enter third: "))\nlargest = a\nif b > largest:\n    largest = b\nif c > largest:\n    largest = c\nprint(f"Largest: {largest}")`,
      output:`Input: 4 9 2 → Largest: 9`,
      explain:`Start assuming 'a' is the largest. Check if 'b' is bigger → update. Check if 'c' is bigger → update. Final value is the largest.` },
    { diff:"medium", title:"Reverse a Number",
      code:`n = int(input("Enter a number: "))\noriginal = n\nrev = 0\nwhile n > 0:\n    last_digit = n % 10    # extract last digit\n    rev = rev * 10 + last_digit  # add to reversed\n    n = n // 10            # remove last digit\nprint(f"Reverse of {original} is {rev}")`,
      output:`Input: 12345 → Reverse: 54321`,
      explain:`Extract last digit with %10. Build reversed number (shift left by ×10 then add digit). Remove last digit with //10. Repeat until n=0.` },
    { diff:"medium", title:"Palindrome Number",
      code:`n = int(input("Enter a number: "))\noriginal = n\nrev = 0\nwhile n > 0:\n    rev = rev * 10 + n % 10\n    n //= 10\nif rev == original:\n    print("Palindrome ✓")\nelse:\n    print("Not a Palindrome ✗")`,
      output:`Input: 121 → Palindrome ✓\nInput: 123 → Not a Palindrome ✗`,
      explain:`Reverse the number using the same logic as above. If reversed number equals original → it's a palindrome.` },
    { diff:"medium", title:"Armstrong Number",
      code:`n = int(input("Enter a number: "))\noriginal = n\nnum_digits = len(str(n))\ntotal = 0\nwhile n > 0:\n    digit = n % 10\n    total += digit ** num_digits\n    n //= 10\nif total == original:\n    print(f"{original} is an Armstrong number ✓")\nelse:\n    print(f"{original} is NOT an Armstrong number ✗")`,
      output:`Input: 153 → 153 is an Armstrong number ✓\nInput: 123 → 123 is NOT an Armstrong number ✗`,
      explain:`153 = 1³+5³+3³ = 1+125+27 = 153. Count digits first. Then extract each digit and raise to power of digit count. Sum = original → Armstrong.` },
    { diff:"hard", title:"GCD (Euclidean)",
      code:`a = int(input("Enter first number: "))\nb = int(input("Enter second number: "))\nwhile b != 0:\n    a, b = b, a % b  # Euclidean algorithm\nprint(f"GCD: {a}")`,
      output:`Input: 48 18 → GCD: 6`,
      explain:`Euclidean algorithm: gcd(48,18) → gcd(18,12) → gcd(12,6) → gcd(6,0) → answer is 6. Keep replacing (a,b) with (b, a%b) until b=0.` },
    { diff:"hard", title:"LCM Using GCD",
      code:`a = int(input("Enter first: "))\nb = int(input("Enter second: "))\n# First find GCD\nx, y = a, b\nwhile y != 0:\n    x, y = y, x % y\ngcd = x\n# LCM formula\nlcm = (a * b) // gcd\nprint(f"GCD: {gcd}")\nprint(f"LCM: {lcm}")`,
      output:`Input: 4 6 → GCD: 2, LCM: 12`,
      explain:`LCM(a,b) = (a×b) ÷ GCD(a,b). First compute GCD using Euclidean algorithm, then apply the formula.` },
    { diff:"expert", title:"Digits in One Pass",
      code:`n = int(input("Enter a number: "))\ncount = 0\ntotal = 0\nproduct = 1\nwhile n > 0:\n    digit = n % 10\n    count += 1\n    total += digit\n    product *= digit\n    n //= 10\nprint(f"Count: {count}, Sum: {total}, Product: {product}")`,
      output:`Input: 2345 → Count: 4, Sum: 14, Product: 120`,
      explain:`One loop does everything at once! Each iteration: extract digit, increment count, add to sum, multiply to product, then remove digit.` },
  ]
},
{
  icon:"🔀", name:"Conditionals",
  solutions:[
    { diff:"beginner", title:"Positive, Negative, Zero",
      code:`n = int(input("Enter a number: "))\nif n > 0:\n    print("Positive")\nelif n < 0:\n    print("Negative")\nelse:\n    print("Zero")`,
      output:`Input: -5 → Negative\nInput: 0 → Zero\nInput: 7 → Positive`,
      explain:`Three possible cases. if checks first. elif (else if) checks if first was False. else catches everything remaining.` },
    { diff:"beginner", title:"Voting Eligibility",
      code:`age = int(input("Enter your age: "))\nif age >= 18:\n    print("You can vote ✓")\nelse:\n    print("Too young to vote ✗")`,
      output:`Input: 16 → Too young\nInput: 20 → You can vote ✓`,
      explain:`Simple if-else. >= means "greater than OR equal to". Age 18 or more → can vote.` },
    { diff:"beginner", title:"Pass or Fail",
      code:`marks = int(input("Enter marks (0-100): "))\npercentage = marks\nif marks >= 40:\n    print(f"Result: Pass ✓ | {percentage}%")\nelse:\n    print(f"Result: Fail ✗ | {percentage}%")`,
      output:`Input: 35 → Fail ✗ | 35%\nInput: 72 → Pass ✓ | 72%`,

let currentTopic = 0;
let activeFilter = 'all';

function init() {
  // Build sidebar
  const nav = document.getElementById('sbNav');
  nav.innerHTML = TOPICS.map((t,i) => `
    <div class="sb-item ${i===0?'active':''}" onclick="loadTopic(${i})">
      <div class="sb-icon">${t.icon}</div>
      <div>
        <div class="sb-name">${t.name}</div>
        <div class="sb-count">${t.solutions.length} solutions</div>
      </div>
    </div>
  `).join('');
  loadTopic(0);
}

function loadTopic(idx) {
  currentTopic = idx;
  activeFilter = 'all';
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  document.querySelector('.fbtn.all').classList.add('on');
  document.querySelectorAll('.sb-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('topTitle').textContent = TOPICS[idx].icon + ' ' + TOPICS[idx].name;
  document.getElementById('topSub').textContent = `${TOPICS[idx].solutions.length} solutions — click any card to expand`;
  renderSolutions();
}

function renderSolutions() {
  const t = TOPICS[currentTopic];
  const diffs = ['beginner','easy','medium','hard','expert'];
  const labels = {beginner:'🟢 BEGINNER', easy:'🔵 EASY', medium:'🟡 MEDIUM', hard:'🔴 HARD', expert:'⚫ EXPERT'};
  let html = '';
  let num = 1;
  diffs.forEach(diff => {
    const qs = t.solutions.filter(s=>s.diff===diff);
    if(!qs.length) return;
    if(activeFilter !== 'all' && activeFilter !== diff) return;
    html += `<div>
      <div class="diff-section-hdr">
        <span class="diff-section-hdr-label" style="color:var(--${diff})">${labels[diff]}</span>
        <div class="diff-section-hdr-line"></div>
      </div>`;
    qs.forEach((s, si) => {
      const idx = t.solutions.indexOf(s);
      html += `
        <div class="sol-card" data-diff="${diff}" id="sc-${idx}">
          <div class="sol-header" onclick="toggleCard(${idx})">
            <div class="sol-num">#${String(num).padStart(3,'0')}</div>
            <div class="sol-info">
              <div class="sol-title">${s.title}</div>
              <div class="sol-desc">${s.explain.substring(0,80)}...</div>
            </div>
            <div class="sol-right">
              <span class="diff-pill dp-${diff}">${diff.toUpperCase()}</span>
              <span class="chevron">▾</span>
            </div>
          </div>
          <div class="sol-body">
            <div class="sol-inner">
              <div>
                <div class="sec-label">Python Solution</div>
                <div class="code-wrap">
                  <div class="code-block" id="code-${idx}">${hl(s.code)}</div>
                  <button class="copy-btn" onclick="copyCode(${idx})">Copy</button>
                </div>
              </div>
              <div>
                <div class="sec-label">Output</div>
                <div class="output-box">${s.output}</div>
              </div>
              <div>
                <div class="sec-label">💡 Explanation</div>
                <div class="explain-box">${s.explain}</div>
              </div>
            </div>
          </div>
        </div>`;
      num++;
    });
    html += '</div>';
  });
  document.getElementById('content').innerHTML = html || '<div style="padding:40px;color:var(--muted);text-align:center">No solutions for this filter</div>';
}

function toggleCard(idx) {
  const card = document.getElementById(`sc-${idx}`);
  card.classList.toggle('open');
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  const map = {all:'all',beginner:'fb',easy:'fe',medium:'fm',hard:'fh',expert:'fx'};
  document.querySelector(`.fbtn.${map[f]}`).classList.add('on');
  renderSolutions();
}

function copyCode(idx) {
  const t = TOPICS[currentTopic];
  const code = t.solutions[idx].code;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.querySelector(`#sc-${idx} .copy-btn`);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent='Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

init();
</script>
</body>
</html>
