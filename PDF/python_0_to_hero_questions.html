<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 0 to Hero — Question Bank</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Clash+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b12;
  --surface: #0e1320;
  --card: #111827;
  --border: #1f2937;
  --border2: #2d3748;
  --text: #f1f5f9;
  --muted: #64748b;
  --dim: #94a3b8;
  
  --beginner: #22c55e;
  --easy: #3b82f6;
  --medium: #f59e0b;
  --hard: #ef4444;
  --expert: #a855f7;

  --beginner-bg: rgba(34,197,94,0.08);
  --easy-bg: rgba(59,130,246,0.08);
  --medium-bg: rgba(245,158,11,0.08);
  --hard-bg: rgba(239,68,68,0.08);
  --expert-bg: rgba(168,85,247,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
}

/* Noise overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* Sidebar */
#sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 100;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-top {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--beginner);
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.sidebar-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}

.sidebar-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  font-family: 'JetBrains Mono', monospace;
}

/* Overall progress */
.overall-prog {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
}

.prog-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.prog-label {
  font-size: 11px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}

.prog-val {
  font-size: 12px;
  font-weight: 700;
  color: var(--beginner);
  font-family: 'JetBrains Mono', monospace;
}

.prog-bar-outer {
  height: 4px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}

.prog-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--beginner), var(--easy));
  border-radius: 99px;
  transition: width 0.4s;
}

/* Nav list */
.nav-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 10px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
  position: relative;
}

.nav-item:hover { background: rgba(255,255,255,0.04); }
.nav-item.active { background: rgba(34,197,94,0.1); }
.nav-item.active .nav-item-name { color: var(--beginner); }

.nav-item-icon { font-size: 18px; min-width: 22px; }

.nav-item-info { flex: 1; min-width: 0; }

.nav-item-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nav-item-count {
  font-size: 10px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 1px;
}

.nav-done-badge {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  background: rgba(34,197,94,0.15);
  color: var(--beginner);
  padding: 2px 7px;
  border-radius: 99px;
}

/* Diff legend */
.diff-legend {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.diff-dot {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}

.dot {
  width: 7px; height: 7px;
  border-radius: 99px;
}

/* Main area */
#main {
  margin-left: 260px;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* Top header */
.top-header {
  position: sticky;
  top: 0;
  background: rgba(8,11,18,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 16px 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  z-index: 50;
}

.topic-hero {
  display: flex;
  align-items: center;
  gap: 14px;
}

.topic-hero-icon { font-size: 2rem; }

.topic-hero-name {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text);
}

.topic-hero-sub {
  font-size: 12px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 2px;
}

.filter-row {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.filter-btn.all { color: var(--dim); }
.filter-btn.all.on, .filter-btn.all:hover { border-color: var(--dim); color: var(--text); background: rgba(148,163,184,0.1); }
.filter-btn.f-beginner { color: var(--beginner); }
.filter-btn.f-beginner.on, .filter-btn.f-beginner:hover { border-color: var(--beginner); background: var(--beginner-bg); }
.filter-btn.f-easy { color: var(--easy); }
.filter-btn.f-easy.on, .filter-btn.f-easy:hover { border-color: var(--easy); background: var(--easy-bg); }
.filter-btn.f-medium { color: var(--medium); }
.filter-btn.f-medium.on, .filter-btn.f-medium:hover { border-color: var(--medium); background: var(--medium-bg); }
.filter-btn.f-hard { color: var(--hard); }
.filter-btn.f-hard.on, .filter-btn.f-hard:hover { border-color: var(--hard); background: var(--hard-bg); }
.filter-btn.f-expert { color: var(--expert); }
.filter-btn.f-expert.on, .filter-btn.f-expert:hover { border-color: var(--expert); background: var(--expert-bg); }

/* Content area */
.content {
  padding: 32px 36px;
  max-width: 900px;
}

/* Section headers */
.diff-section {
  margin-bottom: 36px;
}

.diff-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.diff-header-icon { font-size: 20px; }

.diff-header-label {
  font-size: 13px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
}

.diff-header-count {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  background: var(--border);
  padding: 2px 8px;
  border-radius: 99px;
}

.diff-header-line {
  flex: 1;
  height: 1px;
}

/* Question cards */
.q-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
}

.q-card:hover {
  transform: translateX(2px);
}

.q-card.solved {
  border-color: rgba(34,197,94,0.3);
  background: rgba(34,197,94,0.03);
}

.q-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}

.q-index {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  min-width: 28px;
  padding-top: 2px;
}

.q-main { flex: 1; }

.q-title {
  font-size: 0.93rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 6px;
}

.q-desc {
  font-size: 0.84rem;
  color: var(--muted);
  line-height: 1.6;
}

.q-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.q-tag {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid;
}

.q-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  min-width: 60px;
}

.solve-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
  flex-shrink: 0;
}

.solve-btn:hover { border-color: var(--beginner); background: var(--beginner-bg); }
.solve-btn.done { border-color: var(--beginner); background: var(--beginner); color: white; }

.expand-icon {
  color: var(--muted);
  font-size: 16px;
  transition: transform 0.2s;
}

.q-card.open .expand-icon { transform: rotate(180deg); }

/* Expanded body */
.q-body {
  display: none;
  border-top: 1px solid var(--border);
}

.q-card.open .q-body { display: block; }

.q-body-inner {
  padding: 20px 20px 20px 62px;
  display: grid;
  gap: 16px;
}

.qb-section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.io-box {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
  color: #c9d1d9;
}

.io-in { color: var(--easy); }
.io-out { color: var(--beginner); }

.hint-box {
  background: rgba(245,158,11,0.06);
  border: 1px solid rgba(245,158,11,0.2);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  color: #fbbf24;
  line-height: 1.7;
}

.approach-box {
  background: rgba(59,130,246,0.05);
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  color: #93c5fd;
  line-height: 1.7;
}

.mark-done-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid var(--beginner);
  background: transparent;
  color: var(--beginner);
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.mark-done-btn:hover { background: var(--beginner); color: #000; }
.mark-done-btn.done-state { background: var(--beginner); color: #000; }

/* Empty / stats */
.stats-bar {
  display: flex;
  gap: 16px;
  padding: 20px 36px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.15);
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
}

.stat-label {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.3;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* Mobile */
@media (max-width: 768px) {
  #sidebar { display: none; }
  #main { margin-left: 0; }
  .content { padding: 20px 16px; }
  .top-header { padding: 12px 16px; flex-direction: column; align-items: flex-start; }
  .q-body-inner { padding: 16px; }
}

.empty-filter {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 14px;
}

/* Difficulty colors for cards */
.q-card[data-diff="beginner"] { border-left: 3px solid var(--beginner); }
.q-card[data-diff="easy"] { border-left: 3px solid var(--easy); }
.q-card[data-diff="medium"] { border-left: 3px solid var(--medium); }
.q-card[data-diff="hard"] { border-left: 3px solid var(--hard); }
.q-card[data-diff="expert"] { border-left: 3px solid var(--expert); }

.badge-beginner { color: var(--beginner); border-color: var(--beginner); background: var(--beginner-bg); }
.badge-easy { color: var(--easy); border-color: var(--easy); background: var(--easy-bg); }
.badge-medium { color: var(--medium); border-color: var(--medium); background: var(--medium-bg); }
.badge-hard { color: var(--hard); border-color: var(--hard); background: var(--hard-bg); }
.badge-expert { color: var(--expert); border-color: var(--expert); background: var(--expert-bg); }

.section-beginner .diff-header-label { color: var(--beginner); }
.section-easy .diff-header-label { color: var(--easy); }
.section-medium .diff-header-label { color: var(--medium); }
.section-hard .diff-header-label { color: var(--hard); }
.section-expert .diff-header-label { color: var(--expert); }
.section-beginner .diff-header-line { background: var(--beginner); opacity: 0.2; }
.section-easy .diff-header-line { background: var(--easy); opacity: 0.2; }
.section-medium .diff-header-line { background: var(--medium); opacity: 0.2; }
.section-hard .diff-header-line { background: var(--hard); opacity: 0.2; }
.section-expert .diff-header-line { background: var(--expert); opacity: 0.2; }

.mobile-menu {
  display: none;
  position: fixed;
  top: 12px; left: 12px;
  z-index: 200;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  cursor: pointer;
  font-size: 20px;
}

@media(max-width:768px){ .mobile-menu { display: flex; } }

.toast {
  position: fixed;
  bottom: 20px; right: 20px;
  background: var(--beginner);
  color: #000;
  font-weight: 700;
  font-size: 13px;
  padding: 12px 20px;
  border-radius: 10px;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s;
  z-index: 9999;
}
.toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-top">
    <div class="logo">🐍 PYTHON</div>
    <div class="sidebar-title">0 to Hero<br>Question Bank</div>
    <div class="sidebar-sub" id="totalStats">Loading...</div>
  </div>

  <div class="overall-prog">
    <div class="prog-row">
      <span class="prog-label">OVERALL PROGRESS</span>
      <span class="prog-val" id="overallPct">0%</span>
    </div>
    <div class="prog-bar-outer">
      <div class="prog-bar-inner" id="overallBar" style="width:0%"></div>
    </div>
  </div>

  <div class="nav-list" id="navList"></div>

  <div class="diff-legend">
    <div class="diff-dot"><div class="dot" style="background:var(--beginner)"></div>Beginner</div>
    <div class="diff-dot"><div class="dot" style="background:var(--easy)"></div>Easy</div>
    <div class="diff-dot"><div class="dot" style="background:var(--medium)"></div>Medium</div>
    <div class="diff-dot"><div class="dot" style="background:var(--hard)"></div>Hard</div>
    <div class="diff-dot"><div class="dot" style="background:var(--expert)"></div>Expert</div>
  </div>
</div>

<div id="main">
  <div class="stats-bar" id="statsBar"></div>
  <div class="top-header">
    <div class="topic-hero">
      <div class="topic-hero-icon" id="heroIcon">📦</div>
      <div>
        <div class="topic-hero-name" id="heroName">Select a Topic</div>
        <div class="topic-hero-sub" id="heroSub">— questions</div>
      </div>
    </div>
    <div class="filter-row" id="filterRow">
      <button class="filter-btn all on" onclick="setFilter('all')">ALL</button>
      <button class="filter-btn f-beginner" onclick="setFilter('beginner')">🟢 BEGINNER</button>
      <button class="filter-btn f-easy" onclick="setFilter('easy')">🔵 EASY</button>
      <button class="filter-btn f-medium" onclick="setFilter('medium')">🟡 MEDIUM</button>
      <button class="filter-btn f-hard" onclick="setFilter('hard')">🔴 HARD</button>
      <button class="filter-btn f-expert" onclick="setFilter('expert')">⚫ EXPERT</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOPICS = [
  {
    id: 0, icon: "🖨️", name: "Variables & Input/Output",
    desc: "Foundation — storing data, printing, taking input",
    questions: [
      { diff:"beginner", title:"Say Hello", desc:"Print 'Hello, World!' to the screen.", io:"Output: Hello, World!", hint:"Use the print() function.", approach:"print('Hello, World!')" },
      { diff:"beginner", title:"Print Your Name", desc:"Store your name in a variable and print: 'My name is [name]'.", io:"Output: My name is Rahul", hint:"name = 'Rahul' → print(f'My name is {name}')", approach:"Use f-string: print(f'My name is {name}')" },
      { diff:"beginner", title:"Integer Variables", desc:"Store two numbers in variables a=10, b=3. Print their sum, difference, product, and quotient.", io:"Sum: 13 | Diff: 7 | Product: 30 | Quotient: 3.33", hint:"Use +, -, *, / operators.", approach:"print(a+b, a-b, a*b, a/b)" },
      { diff:"beginner", title:"Type Detective", desc:"Create variables of type int, float, str, bool. Use type() to print each type.", io:"<class 'int'> <class 'float'> <class 'str'> <class 'bool'>", hint:"type(variable) returns the data type.", approach:"x=5; print(type(x)) → <class 'int'>" },
      { diff:"beginner", title:"User Input", desc:"Ask the user to enter their name and age. Print: 'Hello [name], you are [age] years old!'", io:"Input: Priya, 21 → Hello Priya, you are 21 years old!", hint:"Use input() to get values. Remember: input() returns a string!", approach:"name=input(); age=input(); print(f'Hello {name}...')" },
      { diff:"easy", title:"Simple Calculator", desc:"Take two numbers as input from the user. Print their sum, difference, product, and floor division.", io:"Input: 15 4 → Sum:19, Diff:11, Prod:60, Div:3", hint:"Convert input to int: a = int(input())", approach:"a=int(input()); b=int(input()); print all four operations" },
      { diff:"easy", title:"Area of Rectangle", desc:"Take length and width as input. Calculate and print the area and perimeter of the rectangle.", io:"Input: 5 3 → Area: 15, Perimeter: 16", hint:"Area = l*w, Perimeter = 2*(l+w)", approach:"l=int(input()); w=int(input()); print(l*w, 2*(l+w))" },
      { diff:"easy", title:"Temperature Converter", desc:"Take temperature in Celsius as input. Convert and print in Fahrenheit. Formula: F = (C × 9/5) + 32", io:"Input: 100 → Output: 212.0°F", hint:"f = (c * 9/5) + 32", approach:"c=float(input()); f=(c*9/5)+32; print(f'{f}°F')" },
      { diff:"easy", title:"Swap Variables", desc:"Given a=5, b=10, swap their values and print both. Do it WITHOUT using a third variable.", io:"Before: a=5 b=10 | After: a=10 b=5", hint:"Python trick: a, b = b, a (tuple unpacking!)", approach:"a, b = b, a — this is the Pythonic way!" },
      { diff:"medium", title:"Distance & Speed", desc:"A car travels distance d km in t hours. Take d and t as input. Print: speed in km/h, and time to cover 500 km at that speed.", io:"Input: 300 3 → Speed: 100km/h, 500km takes: 5.0 hours", hint:"speed = d/t; time_for_500 = 500/speed", approach:"Think: speed = distance / time, then time = distance / speed" },
      { diff:"medium", title:"Circle Stats", desc:"Take radius r as input. Print area (πr²), circumference (2πr), diameter. Use math.pi.", io:"Input: 7 → Area:153.94, Circumference:43.98, Diameter:14", hint:"import math; area = math.pi * r * r", approach:"import math at the top. Use math.pi for π." },
      { diff:"medium", title:"Bill Splitter", desc:"Take total bill, tax percentage, and number of people as input. Print each person's share including tax.", io:"Input: bill=1000, tax=18%, people=4 → Each pays: ₹295.0", hint:"total_with_tax = bill + (bill * tax/100); per_person = total/people", approach:"Calculate tax first, add to bill, then divide by people count." },
    ]
  },
  {
    id: 1, icon: "⚖️", name: "Operators & Math Logic",
    desc: "Arithmetic, modulo, comparison, logical operators",
    questions: [
      { diff:"beginner", title:"Even or Odd", desc:"Take a number n as input. Print 'Even' if divisible by 2, else print 'Odd'.", io:"Input: 7 → Odd | Input: 4 → Even", hint:"Use the % (modulo) operator. If n % 2 == 0 → Even.", approach:"if n % 2 == 0: print('Even') else: print('Odd')" },

// State
let currentTopic = 0;
let activeFilter = 'all';
let solved = {};

function init() {
  // Load solved from memory
  renderNav();
  loadTopic(0);
  updateOverall();
}

function renderNav() {
  const nav = document.getElementById('navList');
  nav.innerHTML = TOPICS.map((t, i) => {
    const total = t.questions.length;
    const done = t.questions.filter((_, qi) => solved[`${i}-${qi}`]).length;
    return `
      <div class="nav-item ${i===currentTopic?'active':''}" onclick="loadTopic(${i})">
        <div class="nav-item-icon">${t.icon}</div>
        <div class="nav-item-info">
          <div class="nav-item-name">${t.name}</div>
          <div class="nav-item-count">${done}/${total} solved</div>
        </div>
        ${done===total ? '<span class="nav-done-badge">✓ Done</span>' : ''}
      </div>
    `;
  });
}

function updateOverall() {
  const total = TOPICS.reduce((s,t)=>s+t.questions.length,0);
  const done = Object.keys(solved).filter(k=>solved[k]).length;
  const pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('overallPct').textContent = pct+'%';
  document.getElementById('overallBar').style.width = pct+'%';
  document.getElementById('totalStats').textContent = `${done}/${total} questions solved`;

  // Stats bar
  const diffs = ['beginner','easy','medium','hard','expert'];
  const icons = {'beginner':'🟢','easy':'🔵','medium':'🟡','hard':'🔴','expert':'⚫'};
  const colors = {'beginner':'var(--beginner)','easy':'var(--easy)','medium':'var(--medium)','hard':'var(--hard)','expert':'var(--expert)'};
  let statsHTML = '';
  diffs.forEach(d => {
    let total_d=0, done_d=0;
    TOPICS.forEach((t,ti) => t.questions.forEach((q,qi) => {
      if(q.diff===d){ total_d++; if(solved[`${ti}-${qi}`]) done_d++; }
    }));
    statsHTML += `
      <div class="stat-item">
        <div class="stat-num" style="color:${colors[d]}">${done_d}</div>
        <div class="stat-label">${icons[d]}<br>${d}</div>
      </div>
    `;
  });
  document.getElementById('statsBar').innerHTML = statsHTML;
}

function loadTopic(idx) {
  currentTopic = idx;
  activeFilter = 'all';
  
  // Update filter buttons
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  document.querySelector('.filter-btn.all').classList.add('on');

  renderNav();
  renderTopic();
}

function renderTopic() {
  const t = TOPICS[currentTopic];
  document.getElementById('heroIcon').textContent = t.icon;
  document.getElementById('heroName').textContent = t.name;
  document.getElementById('heroSub').textContent = `${t.questions.length} questions · ${t.desc}`;

  const diffs = ['beginner','easy','medium','hard','expert'];
  const diffLabels = {
    beginner:'🟢 BEGINNER', easy:'🔵 EASY', medium:'🟡 MEDIUM', hard:'🔴 HARD', expert:'⚫ EXPERT / INTERVIEW'
  };

  let html = '';
  let globalIdx = 1;

  diffs.forEach(diff => {
    const qs = t.questions.map((q,qi)=>({...q,qi})).filter(q=>q.diff===diff);
    if(qs.length===0) return;
    if(activeFilter !== 'all' && activeFilter !== diff) return;

    html += `<div class="diff-section section-${diff}">
      <div class="diff-header">
        <span class="diff-header-label">${diffLabels[diff]}</span>
        <span class="diff-header-count">${qs.length} questions</span>
        <div class="diff-header-line"></div>
      </div>`;

    qs.forEach(q => {
      const key = `${currentTopic}-${q.qi}`;
      const isSolved = solved[key];
      html += `
        <div class="q-card ${isSolved?'solved':''}" data-diff="${diff}" id="qcard-${q.qi}">
          <div class="q-header" onclick="toggleQ(${q.qi})">
            <div class="q-index">#${String(globalIdx).padStart(3,'0')}</div>
            <div class="q-main">
              <div class="q-title">${isSolved?'<span style="color:var(--beginner)">✓</span> ':'' }${q.title}</div>
              <div class="q-desc">${q.desc}</div>
              <div class="q-tags">
                <span class="q-tag badge-${diff}">${diff.toUpperCase()}</span>
              </div>
            </div>
            <div class="q-right">
              <button class="solve-btn ${isSolved?'done':''}" onclick="event.stopPropagation(); toggleSolved(${q.qi})">${isSolved?'✓':'○'}</button>
              <span class="expand-icon">▾</span>
            </div>
          </div>
          <div class="q-body">
            <div class="q-body-inner">
              <div>
                <div class="qb-section-title">Example Input / Output</div>
                <div class="io-box"><span class="io-out">${q.io}</span></div>
              </div>
              <div>
                <div class="qb-section-title">💡 Hint (try without first!)</div>
                <div class="hint-box">${q.hint}</div>
              </div>
              <div>
                <div class="qb-section-title">🧠 Approach / Key Idea</div>
                <div class="approach-box">${q.approach}</div>
              </div>
              <button class="mark-done-btn ${isSolved?'done-state':''}" onclick="toggleSolved(${q.qi})">
                ${isSolved ? '✓ Marked as Solved — Click to Undo' : '○ Mark as Solved'}
              </button>
            </div>
          </div>
        </div>`;
      globalIdx++;
    });

    html += '</div>';
  });

  if(html === '') {
    html = `<div class="empty-filter">No questions match this filter for this topic.</div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function toggleQ(qi) {
  const card = document.getElementById(`qcard-${qi}`);
  card.classList.toggle('open');
}

function toggleSolved(qi) {
  const key = `${currentTopic}-${qi}`;
  solved[key] = !solved[key];
  const wasSolved = solved[key];
  showToast(wasSolved ? `✅ Marked as solved! Keep going!` : `↩️ Unmarked`);
  renderTopic();
  renderNav();
  updateOverall();
  // Re-open the card
  setTimeout(() => {
    const card = document.getElementById(`qcard-${qi}`);
    if(card) card.classList.add('open');
  }, 50);
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  const map = {'all':'all','beginner':'f-beginner','easy':'f-easy','medium':'f-medium','hard':'f-hard','expert':'f-expert'};
  document.querySelector(`.filter-btn.${map[f]}`).classList.add('on');
  renderTopic();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
