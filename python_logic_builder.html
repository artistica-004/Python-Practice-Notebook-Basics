<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Logic Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --highlight: #1e1a2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .badge {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  header h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #e2e8f0 0%, #7c3aed 50%, #06b6d4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  header p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Progress bar */
  .progress-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  .xp-badge {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent3);
    font-weight: 700;
    white-space: nowrap;
  }

  /* Topic nav */
  .topic-nav {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .topic-btn {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .topic-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .topic-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .topic-btn.completed {
    border-color: var(--green);
    color: var(--green);
  }

  .topic-btn.completed.active {
    background: var(--green);
    color: white;
  }

  /* Main card */
  .main-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .card-header {
    padding: 24px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
  }

  .topic-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .level-pill {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .level-beginner { background: rgba(16,185,129,0.15); color: var(--green); }
  .level-easy { background: rgba(6,182,212,0.15); color: var(--accent2); }
  .level-medium { background: rgba(245,158,11,0.15); color: var(--accent3); }
  .level-hard { background: rgba(239,68,68,0.15); color: var(--red); }

  .topic-number {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .card-header h2 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
  }

  .emoji-icon {
    font-size: 2.5rem;
    line-height: 1;
  }

  /* Sections */
  .card-body {
    padding: 28px;
  }

  .section {
    margin-bottom: 28px;
  }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Concept box */
  .concept-box {
    background: var(--highlight);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 12px;
    padding: 20px;
    line-height: 1.8;
    font-size: 0.95rem;
    color: #c4c4d4;
  }

  .concept-box .highlight-word {
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
    font-size: 0.85em;
    background: rgba(6,182,212,0.1);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* Code block */
  .code-block {
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.8;
    overflow-x: auto;
    position: relative;
  }

  .code-block .kw { color: #c792ea; }
  .code-block .fn { color: #82aaff; }
  .code-block .str { color: #c3e88d; }
  .code-block .num { color: #f78c6c; }
  .code-block .cm { color: #546e7a; font-style: italic; }
  .code-block .op { color: #89ddff; }
  .code-block .var { color: #eeffff; }

  .code-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    position: absolute;
    top: 10px;
    right: 14px;
    letter-spacing: 1px;
  }

  /* Logic steps */
  .logic-steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .logic-step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .step-num {
    width: 26px;
    height: 26px;
    min-width: 26px;
    border-radius: 6px;
    background: var(--accent);
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .step-text {
    font-size: 0.9rem;
    color: #c4c4d4;
    line-height: 1.6;
    padding-top: 2px;
  }

  /* Questions */
  .questions-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .question-card {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .question-card:hover {
    border-color: rgba(124,58,237,0.4);
  }

  .question-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    cursor: pointer;
    background: rgba(255,255,255,0.02);
    user-select: none;
  }

  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent3);
    font-weight: 700;
    min-width: 24px;
  }

  .q-text {
    flex: 1;
    font-size: 0.92rem;
    color: var(--text);
    line-height: 1.5;
  }

  .q-diff {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .q-toggle {
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.2s;
  }

  .question-card.open .q-toggle {
    transform: rotate(180deg);
  }

  .question-hint {
    padding: 16px 20px;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid var(--border);
    display: none;
  }

  .question-card.open .question-hint {
    display: block;
  }

  .hint-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--green);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .hint-text {
    font-size: 0.88rem;
    color: #a0a0b8;
    line-height: 1.7;
  }

  /* Nav buttons */
  .nav-row {
    display: flex;
    gap: 12px;
    justify-content: space-between;
    align-items: center;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .btn-outline:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover {
    background: #6d28d9;
    transform: translateY(-1px);
  }

  .btn-success {
    background: var(--green);
    color: white;
  }

  .btn-success:hover {
    background: #059669;
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none !important;
  }

  /* Roadmap */
  .roadmap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 28px;
  }

  .roadmap h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .roadmap-steps {
    display: flex;
    gap: 0;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
  }

  .roadmap-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: rgba(255,255,255,0.02);
    cursor: pointer;
    transition: all 0.2s;
  }

  .roadmap-item:hover { border-color: var(--accent); color: var(--text); }
  .roadmap-item.active { border-color: var(--accent); color: var(--accent); background: rgba(124,58,237,0.1); }
  .roadmap-item.done { border-color: var(--green); color: var(--green); background: rgba(16,185,129,0.08); }

  .roadmap-arrow {
    color: var(--border);
    font-size: 14px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: white;
    padding: 14px 20px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  @media (max-width: 600px) {
    .card-header { flex-direction: column; }
    .nav-row { flex-direction: column; }
    .btn { width: 100%; justify-content: center; }
    .progress-section { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">🐍 Your Personal Python Tutor</div>
    <h1>Python Logic Builder</h1>
    <p>Master programming logic step by step — from zero to problem-solver. Built just for you.</p>
  </header>

  <div class="progress-section">
    <span class="progress-label">YOUR PROGRESS</span>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <span class="xp-badge" id="xpDisplay">⚡ 0 XP</span>
  </div>

  <div class="topic-nav" id="topicNav"></div>

  <div class="main-card" id="mainCard"></div>

  <div class="nav-row">
    <button class="btn btn-outline" id="prevBtn" onclick="navigate(-1)">← Previous</button>
    <button class="btn btn-success" id="doneBtn" onclick="markDone()">✓ Mark as Done</button>
    <button class="btn btn-primary" id="nextBtn" onclick="navigate(1)">Next Topic →</button>
  </div>

  <br>
  <div class="roadmap">
    <h3>🗺️ Your Learning Roadmap</h3>
    <div class="roadmap-steps" id="roadmapSteps"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const topics = [
  {
    id: 0,
    emoji: "🧠",
    title: "How Computers Think",
    level: "beginner",
    levelLabel: "BEGINNER",
    concept: `Before writing code, understand <span class="highlight-word">HOW a computer thinks</span>. A computer is very DUMB — it only does EXACTLY what you tell it. It reads instructions one by one, from top to bottom. Your job as a programmer is to write those instructions clearly. Logic building means: <span class="highlight-word">breaking a big problem into tiny steps</span>.`,
    codeExample: `<span class="cm"># Think like a computer — step by step</span>
<span class="cm"># Task: Make a cup of tea</span>

<span class="cm"># Step 1: Boil water</span>
<span class="var">water_boiled</span> <span class="op">=</span> <span class="kw">True</span>

<span class="cm"># Step 2: Add tea bag</span>
<span class="var">tea_added</span> <span class="op">=</span> <span class="kw">True</span>

<span class="cm"># Step 3: Pour and serve</span>
<span class="fn">print</span>(<span class="str">"Tea is ready! ☕"</span>)`,
    logicSteps: [
      "Every program = a list of steps the computer follows ONE BY ONE",
      "You must tell the computer EVERYTHING — it guesses nothing",
      "Break any problem into: Input → Process → Output",
      "Example: Name input → 'Hello, Name!' output → that's a program!"
    ],
    questions: [
      { q: "Write steps (in plain English) to check if a number is even or odd. Don't code yet — just list the steps!", diff: "easy", hint: "Step 1: Take a number. Step 2: Divide it by 2. Step 3: Check the remainder. Step 4: If remainder is 0 → Even, else → Odd" },
      { q: "Think about making a sandwich. Write it as computer instructions (5+ steps). Then convert each step to a Python print() statement.", diff: "easy", hint: "print('Step 1: Get bread'), print('Step 2: Spread butter')... You're already coding logic!" },
      { q: "What is 17 % 2 in Python? What does the % operator do? Why is it useful for even/odd checks?", diff: "medium", hint: "% is the modulo operator — it gives the REMAINDER after division. 17 % 2 = 1 (odd), 16 % 2 = 0 (even)" }
    ]
  },
  {
    id: 1,
    emoji: "📦",
    title: "Variables & Data Types",
    level: "beginner",
    levelLabel: "BEGINNER",
    concept: `A <span class="highlight-word">variable</span> is like a box with a label. You store information inside it. Python has different types of boxes: <span class="highlight-word">int</span> (whole numbers), <span class="highlight-word">float</span> (decimal numbers), <span class="highlight-word">str</span> (text), <span class="highlight-word">bool</span> (True/False). The KEY logic skill: knowing WHAT type of data you need for a problem.`,
    codeExample: `<span class="cm"># Variables — labelled boxes that store data</span>
<span class="var">name</span> <span class="op">=</span> <span class="str">"Rahul"</span>          <span class="cm"># str (text)</span>
<span class="var">age</span> <span class="op">=</span> <span class="num">20</span>              <span class="cm"># int (whole number)</span>
<span class="var">height</span> <span class="op">=</span> <span class="num">5.9</span>          <span class="cm"># float (decimal)</span>
<span class="var">is_student</span> <span class="op">=</span> <span class="kw">True</span>    <span class="cm"># bool (yes/no)</span>

<span class="cm"># You can change what's inside a box!</span>
<span class="var">age</span> <span class="op">=</span> <span class="var">age</span> <span class="op">+</span> <span class="num">1</span>         <span class="cm"># age is now 21</span>
<span class="fn">print</span>(<span class="str">f"Hi {name}, you are {age}!"</span>)`,
    logicSteps: [
      "Ask yourself: What information do I need to STORE to solve this problem?",
      "Choose the right type: Numbers → int/float, Text → str, Yes/No → bool",
      "Name variables clearly: 'age' not 'a', 'total_price' not 'tp'",
      "Variables can be updated: score = score + 10 (this is very common in logic!)"
    ],
    questions: [
      { q: "Create variables to store info about yourself: name, age, city, is_working. Print them in a sentence.", diff: "easy", hint: "Use f-strings: print(f'My name is {name}, I am {age} years old from {city}')" },
      { q: "Write a program: take price = 100 and discount = 20. Calculate final price and print it.", diff: "easy", hint: "final_price = price - (price * discount / 100). Print the result!" },
      { q: "A shop sells apples at ₹5 each. User buys 'n' apples. Store the total cost in a variable and print the bill.", diff: "medium", hint: "n = 7, price_per_apple = 5, total = n * price_per_apple, print(f'Total: ₹{total}')" },
      { q: "Swap two variables WITHOUT using a third variable. Example: a=5, b=10 → after swap: a=10, b=5", diff: "hard", hint: "Python trick: a, b = b, a — this is called tuple unpacking! Try it." }
    ]
  },
  {
    id: 2,
    emoji: "🔀",
    title: "If/Else — Decision Making",
    level: "easy",
    levelLabel: "EASY",
    concept: `<span class="highlight-word">If/Else</span> is how your program makes DECISIONS. Real life: "If it's raining, take umbrella, else go without." Programming is the same! This is the MOST IMPORTANT logic concept. Every real-world problem involves decisions. Master this = huge logic boost.`,
    codeExample: `<span class="cm"># If/Else — making decisions</span>
<span class="var">marks</span> <span class="op">=</span> <span class="num">72</span>

<span class="kw">if</span> <span class="var">marks</span> <span class="op">>=</span> <span class="num">90</span><span class="op">:</span>
    <span class="fn">print</span>(<span class="str">"Grade: A"</span>)
<span class="kw">elif</span> <span class="var">marks</span> <span class="op">>=</span> <span class="num">70</span><span class="op">:</span>
    <span class="fn">print</span>(<span class="str">"Grade: B"</span>)   <span class="cm"># ← This runs!</span>
<span class="kw">elif</span> <span class="var">marks</span> <span class="op">>=</span> <span class="num">50</span><span class="op">:</span>
    <span class="fn">print</span>(<span class="str">"Grade: C"</span>)
<span class="kw">else</span><span class="op">:</span>
    <span class="fn">print</span>(<span class="str">"Grade: F"</span>)`,
    logicSteps: [
      "Identify: what CONDITION decides the outcome? (age > 18, marks >= 50...)",
      "List ALL possible cases — don't miss edge cases!",
      "Use elif for multiple conditions (not nested ifs for everything)",
      "Always ask: what happens if NONE of the conditions are true? → that's your 'else'"
    ],
    questions: [
      { q: "Write a program: ask for temperature. If > 35 → 'Too hot!', if 20-35 → 'Nice weather', else → 'Too cold!'", diff: "easy", hint: "temp = 38; if temp > 35: ... elif temp >= 20: ... else: ..." },
      { q: "Traffic light logic: if color is 'red' → stop, 'yellow' → slow, 'green' → go, anything else → 'invalid color'", diff: "easy", hint: "Use if/elif/elif/else. Check the string value of color variable." },
      { q: "A bank charges: balance < 1000 → ₹50 fee, 1000-10000 → ₹20 fee, > 10000 → no fee. Write this logic.", diff: "medium", hint: "Think about the order of conditions. Check smallest balance first." },
      { q: "Check if a year is a leap year. Rule: divisible by 4 AND (not divisible by 100 OR divisible by 400)", diff: "hard", hint: "Use 'and', 'or', 'not' operators. if (year % 4 == 0 and year % 100 != 0) or (year % 400 == 0):" }
    ]
  },
  {
    id: 3,
    emoji: "🔁",
    title: "Loops — Repetition Logic",
    level: "easy",
    levelLabel: "EASY",
    concept: `<span class="highlight-word">Loops</span> make computers do repetitive tasks without you writing the same line 100 times. Two types: <span class="highlight-word">for loop</span> (when you know HOW MANY times) and <span class="highlight-word">while loop</span> (when you loop UNTIL a condition is false). This is where logic building really begins!`,
    codeExample: `<span class="cm"># FOR loop — repeat a known number of times</span>
<span class="kw">for</span> <span class="var">i</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="num">1</span>, <span class="num">6</span>)<span class="op">:</span>
    <span class="fn">print</span>(<span class="str">f"Count: {i}"</span>)   <span class="cm"># prints 1 to 5</span>

<span class="cm"># WHILE loop — repeat UNTIL condition is false</span>
<span class="var">password</span> <span class="op">=</span> <span class="str">""</span>

    questions: [

      { q: "Write a function celsius_to_fahrenheit(c) AND fahrenheit_to_celsius(f). Use them to convert 100°C and 212°F", diff: "hard", hint: "F = (C × 9/5) + 32; C = (F - 32) × 5/9. Write both functions and call them." }

    questions: [

let currentTopic = 0;
let completedTopics = new Set();
let xp = 0;

function renderNav() {
  const nav = document.getElementById('topicNav');
  nav.innerHTML = topics.map((t, i) => `
    <button class="topic-btn ${i === currentTopic ? 'active' : ''} ${completedTopics.has(i) ? 'completed' : ''}"
      onclick="goToTopic(${i})">
      ${t.emoji} ${t.title.split(' ')[0]}
    </button>
  `).join('');
}

function renderRoadmap() {
  const steps = document.getElementById('roadmapSteps');
  steps.innerHTML = topics.map((t, i) => `
    ${i > 0 ? '<span class="roadmap-arrow">→</span>' : ''}
    <div class="roadmap-item ${i === currentTopic ? 'active' : ''} ${completedTopics.has(i) ? 'done' : ''}"
      onclick="goToTopic(${i})">
      ${completedTopics.has(i) ? '✓' : t.emoji} ${t.title.split('—')[0].trim()}
    </div>
  `).join('');
}

function renderTopic() {
  const t = topics[currentTopic];
  const card = document.getElementById('mainCard');

  const questionsHTML = t.questions.map((q, qi) => `
    <div class="question-card" id="qcard-${qi}">
      <div class="question-header" onclick="toggleQuestion(${qi})">
        <span class="q-num">Q${qi+1}</span>
        <span class="q-text">${q.q}</span>
        <span class="q-diff level-${q.diff === 'easy' ? 'easy' : q.diff === 'medium' ? 'medium' : q.diff === 'hard' ? 'hard' : 'beginner'}"
          style="font-size:10px;padding:3px 8px;border-radius:4px;">${q.diff.toUpperCase()}</span>
        <span class="q-toggle">▾</span>
      </div>
      <div class="question-hint">
        <div class="hint-label">💡 HINT</div>
        <div class="hint-text">${q.hint}</div>
      </div>
    </div>
  `).join('');

  const stepsHTML = t.logicSteps.map((s, i) => `
    <div class="logic-step">
      <div class="step-num">${i+1}</div>
      <div class="step-text">${s}</div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="topic-meta">
          <span class="level-pill level-${t.level}">${t.levelLabel}</span>
          <span class="topic-number">TOPIC ${t.id + 1} of ${topics.length}</span>
        </div>
        <h2>${t.title}</h2>
      </div>
      <div class="emoji-icon">${t.emoji}</div>
    </div>
    <div class="card-body">
      <div class="section">
        <div class="section-title">What is it?</div>
        <div class="concept-box">${t.concept}</div>
      </div>
      <div class="section">
        <div class="section-title">See it in Code</div>
        <div class="code-block">
          <span class="code-label">PYTHON</span>
          ${t.codeExample}
        </div>
      </div>
      <div class="section">
        <div class="section-title">Logic Building Steps</div>
        <div class="logic-steps">${stepsHTML}</div>
      </div>
      <div class="section">
        <div class="section-title">Practice Questions (Click for hints)</div>
        <div class="questions-list">${questionsHTML}</div>
      </div>
    </div>
  `;

  updateButtons();
  updateProgress();
  renderNav();
  renderRoadmap();
}

function toggleQuestion(qi) {
  const card = document.getElementById(`qcard-${qi}`);
  card.classList.toggle('open');
}

function goToTopic(i) {
  currentTopic = i;
  renderTopic();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigate(dir) {
  const next = currentTopic + dir;
  if (next >= 0 && next < topics.length) {
    currentTopic = next;
    renderTopic();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function markDone() {
  if (!completedTopics.has(currentTopic)) {
    completedTopics.add(currentTopic);
    xp += 100;
    showToast(`🎉 Topic completed! +100 XP`);
    updateProgress();
    renderNav();
    renderRoadmap();
    updateButtons();
  } else {
    showToast(`✅ Already completed!`);
  }
}

function updateProgress() {
  const pct = (completedTopics.size / topics.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('xpDisplay').textContent = `⚡ ${xp} XP`;
}

function updateButtons() {
  document.getElementById('prevBtn').disabled = currentTopic === 0;
  document.getElementById('nextBtn').disabled = currentTopic === topics.length - 1;
  const isDone = completedTopics.has(currentTopic);
  const doneBtn = document.getElementById('doneBtn');
  doneBtn.textContent = isDone ? '✓ Completed!' : '✓ Mark as Done';
  doneBtn.className = isDone ? 'btn btn-outline' : 'btn btn-success';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
renderTopic();
</script>
